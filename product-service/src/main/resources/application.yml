spring:
  application:
    name: product-service

  # 12-factor: DB 접속 정보는 코드에 박지 않고 전부 환경변수로 외부화
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/productdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:product}
    password: ${SPRING_DATASOURCE_PASSWORD:productpw}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          # product-db까지 준비돼야 readiness UP
          include: readinessState,db

logging:
  level:
    org.hibernate.SQL: debug