spring:
  application:
    name: product-service

  # 12-factor: DB 접속 정보는 코드에 박지 않고 전부 환경변수로 외부화
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/productdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:product}
    password: ${SPRING_DATASOURCE_PASSWORD:productpw}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Kafka 구독자(consumer) -> order-events 토픽을 JSON으로 역직렬화
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: product-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.commerce.product.messaging.event.OrderCreatedEvent
        spring.json.trusted.packages: "*"

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          # product-db까지 준비돼야 readiness UP
          include: readinessState,db

logging:
  level:
    org.hibernate.SQL: debug