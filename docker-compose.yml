# 2лӢЁкі„: м„ңл№„мҠӨ 2к°ң(order, product) + DB 2к°ң(order-db, product-db)
#
# н•өмӢ¬ нҸ¬мқёнҠё
# - к°Ғ м„ңл№„мҠӨлҠ” мһҗкё° DBл§Ң мҶҢмң  (DB per service). orderлҠ” productмқҳ н…Ңмқҙлё”мқ„ лӘЁлҰ„
# - order-serviceлҠ” product-serviceлҘј 'product-service'лқјлҠ” DNSлЎң нҳём¶ң (PRODUCT_SERVICE_URL)
# - order-serviceлҠ” product-serviceмқҳ healthлҘј 'кё°лӢӨлҰ¬м§Җ м•ҠлҠ”лӢӨ' (depends_onм—җ product м—ҶмқҢ)
# - productк°Җ мЈҪм–ҙлҸ„ orderлҠ” л–  мһҲкі , 'мЈјл¬ё мҡ”мІӯмқ„ л°ӣлҠ” мҲңк°„' мӢӨнҢЁк°Җ м „нҢҢлҗҳлҠ” кұё кҙҖм°°н•ҙліҙкё°

services:
  order-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${ORDER_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ORDER_DB_NAME}
      MYSQL_USER: ${ORDER_DB_USER}
      MYSQL_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "${ORDER_DB_PORT}:3306"
    volumes:
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${ORDER_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - commerce-net

  order-service:
    build:
      context: ./order-service
    environment:
      SERVER_PORT: 8080
      # DB нҳёмҠӨнҠёлҠ” кі м • IPк°Җ м•„лӢҲлқј compose м„ңл№„мҠӨ мқҙлҰ„ (order-db)
      SPRING_DATASOURCE_URL: jdbc:mysql://order-db:3306/${ORDER_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      # мқҳмЎҙ м„ңл№„мҠӨлҸ„ DNSлЎң (orderлҠ” н•ҙлӢ№ мЈјмҶҢлЎң productлҘј лҸҷкё° нҳём¶ң)
      PRODUCT_SERVICE_URL: http://product-service:8080
      # Kafka лёҢлЎңм»ӨлҸ„ DNSлЎң
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${ORDER_SERVICE_PORT}:8080"
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # product-serviceлҠ” depends_onм—җ л„Јм§Җ м•ҠлҠ”лӢӨ (мқјл¶Җлҹ¬ мқҳлҸ„)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - commerce-net

  product-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${PRODUCT_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PRODUCT_DB_NAME}
      MYSQL_USER: ${PRODUCT_DB_USER}
      MYSQL_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "${PRODUCT_DB_PORT}:3306"
    volumes:
      - product-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${PRODUCT_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - commerce-net

  product-service:
    build:
      context: ./product-service
    environment:
      SERVER_PORT: 8080
      # productлҸ„ мһҗкё° DB(product-db)м—җ DNSлЎң л¶ҷмқҢ
      SPRING_DATASOURCE_URL: jdbc:mysql://product-db:3306/${PRODUCT_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${PRODUCT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PRODUCT_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${PRODUCT_SERVICE_PORT}:8080"
    depends_on:
      product-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - commerce-net

  # payment-service + payment-db -> кІ°м ңлҠ” saga мқҙлІӨнҠёлЎң кө¬лҸҷ
  payment-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${PAYMENT_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PAYMENT_DB_NAME}
      MYSQL_USER: ${PAYMENT_DB_USER}
      MYSQL_PASSWORD: ${PAYMENT_DB_PASSWORD}
    ports:
      - "${PAYMENT_DB_PORT}:3306"
    volumes:
      - payment-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${PAYMENT_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - commerce-net

  payment-service:
    build:
      context: ./payment-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-db:3306/${PAYMENT_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD}
    ports:
      - "${PAYMENT_SERVICE_PORT}:8080"
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - commerce-net

  # 3лӢЁкі„: мқҙлІӨнҠё лёҢлЎңм»Ө. лӢЁмқј лёҢлЎңм»Ө KRaft лӘЁл“ң(мЈјнӮӨнҚј м—ҶмқҢ).
  # лҰ¬мҠӨл„Ҳ 2к°ң:
  #   - PLAINTEXT(kafka:9092): compose л„ӨнҠёмӣҢнҒ¬ м•Ҳмқҳ м„ңл№„мҠӨл“Өмқҙ м“°лҠ” мЈјмҶҢ
  #   - EXTERNAL(localhost:9094): л§Ҙ(нҳёмҠӨнҠё)м—җм„ң IDEлЎң м§Ғм ‘ лқ„мҡё л•Ң м“°лҠ” мЈјмҶҢ
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # лӢЁмқј лёҢлЎңм»Өлқј ліөм ң мқёмһҗлҠ” м „л¶Җ 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - commerce-net

volumes:
  order-db-data:
  product-db-data:
  payment-db-data:

networks:
  commerce-net:
    driver: bridge